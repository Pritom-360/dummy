<!-- inventory.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Garage ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><i class="fa-solid fa-wrench"></i><span class="logo-text">Garage ERP</span></div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fa-solid fa-chart-line"></i> <span class="menu-text">Dashboard</span></a></li>
            <li><a href="customers.html"><i class="fa-solid fa-users"></i> <span class="menu-text">Customers</span></a></li>
            <li><a href="work-orders.html"><i class="fa-solid fa-clipboard-list"></i> <span class="menu-text">Work Orders</span></a></li>
            <li><a href="inventory.html" class="active"><i class="fa-solid fa-boxes-stacked"></i> <span class="menu-text">Inventory</span></a></li>
        </ul>
    </aside>

    <main class="main-wrapper" id="main-wrapper">
        <header class="top-nav">
            <div class="nav-left"><button id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button></div>
        </header>

        <div class="content-area">
            <div class="page-header">
                <h2>Parts Inventory</h2>
                <button class="btn-primary"><i class="fa-solid fa-plus"></i> Add Part</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Part Name</th>
                            <th>SKU</th>
                            <th>Stock Quantity</th>
                            <th>Price</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Synthetic Motor Oil</td>
                            <td>OIL-5W30</td>
                            <td>45</td>
                            <td>$25.00</td>
                            <td><span class="status-badge status-completed">In Stock</span></td>
                        </tr>
                        <tr>
                            <td>Brake Pads (Front)</td>
                            <td>BRK-FRT-01</td>
                            <td style="color:var(--danger); font-weight:bold;">2</td>
                            <td>$45.00</td>
                            <td><span class="status-badge status-danger">Low Stock</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
