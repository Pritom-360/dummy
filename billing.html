<!-- billing.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - Garage ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><i class="fa-solid fa-wrench"></i><span class="logo-text">Garage ERP</span></div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fa-solid fa-chart-line"></i> <span class="menu-text">Dashboard</span></a></li>
            <li><a href="customers.html"><i class="fa-solid fa-users"></i> <span class="menu-text">Customers</span></a></li>
            <li><a href="work-orders.html"><i class="fa-solid fa-clipboard-list"></i> <span class="menu-text">Work Orders</span></a></li>
            <li><a href="inventory.html"><i class="fa-solid fa-boxes-stacked"></i> <span class="menu-text">Inventory</span></a></li>
            <li><a href="billing.html" class="active"><i class="fa-solid fa-file-invoice-dollar"></i> <span class="menu-text">Billing</span></a></li>
            <li><a href="reports.html"><i class="fa-solid fa-chart-pie"></i> <span class="menu-text">Reports</span></a></li>
        </ul>
    </aside>

    <main class="main-wrapper" id="main-wrapper">
        <header class="top-nav">
            <div class="nav-left"><button id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button></div>
        </header>

        <div class="content-area">
            <div class="page-header">
                <h2>Billing & Invoices</h2>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Invoice ID</th>
                            <th>Customer</th>
                            <th>Work Order</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>INV-1001</td>
                            <td>John Doe</td>
                            <td>WO-2041</td>
                            <td>$150.00</td>
                            <td><span class="status-badge status-pending">Unpaid</span></td>
                            <td>
                                <button class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem;" title="View Invoice"><i class="fa-solid fa-eye"></i></button>
                                <button class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem; background: #10B981;" title="Mark Paid"><i class="fa-solid fa-check"></i></button>
                                <button class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem; background: #6B7280;" title="Download PDF"><i class="fa-solid fa-download"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>INV-1002</td>
                            <td>Sarah Smith</td>
                            <td>WO-2038</td>
                            <td>$450.00</td>
                            <td><span class="status-badge status-completed">Paid</span></td>
                            <td>
                                <button class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem;" title="View Invoice"><i class="fa-solid fa-eye"></i></button>
                                <button class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem; background: #6B7280;" title="Download PDF"><i class="fa-solid fa-download"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
