<!-- customers.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Garage ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="app-container">
    <!-- Sidebar template goes here (Same as index.html) -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><i class="fa-solid fa-wrench"></i><span class="logo-text">Garage ERP</span></div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fa-solid fa-chart-line"></i> <span class="menu-text">Dashboard</span></a></li>
            <li><a href="customers.html" class="active"><i class="fa-solid fa-users"></i> <span class="menu-text">Customers</span></a></li>
            <li><a href="work-orders.html"><i class="fa-solid fa-clipboard-list"></i> <span class="menu-text">Work Orders</span></a></li>
            <li><a href="inventory.html"><i class="fa-solid fa-boxes-stacked"></i> <span class="menu-text">Inventory</span></a></li>
        </ul>
    </aside>

    <main class="main-wrapper" id="main-wrapper">
        <header class="top-nav">
            <div class="nav-left"><button id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button></div>
            <div class="nav-right"><i class="fa-solid fa-circle-user fa-xl"></i></div>
        </header>

        <div class="content-area">
            <div class="page-header">
                <h2>Customer Directory</h2>
                <button class="btn-primary" onclick="showAddModal('Add Customer', 'Form to create a new customer')"><i class="fa-solid fa-plus"></i> Add Customer</button>
            </div>

            <div class="table-container">
                <div class="table-header-actions">
                    <input type="text" class="search-bar" id="searchCustomer" placeholder="Search by name or phone...">
                    <select class="search-bar" style="width: 200px;">
                        <option value="">Filter by Vehicle</option>
                        <option value="toyota">Toyota</option>
                        <option value="ford">Ford</option>
                        <option value="honda">Honda</option>
                    </select>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Total Visits</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody">
                        <tr>
                            <td>John Doe</td>
                            <td>(555) 123-4567</td>
                            <td>john@example.com</td>
                            <td>4</td>
                            <td><a href="#" style="color:var(--accent-color);">View Profile</a></td>
                        </tr>
                        <tr>
                            <td>Sarah Smith</td>
                            <td>(555) 987-6543</td>
                            <td>sarah@example.com</td>
                            <td>1</td>
                            <td><a href="#" style="color:var(--accent-color);">View Profile</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="js/app.js"></script>
<script src="js/customers.js"></script>
</body>
</html>
