<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Garage ERP</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <i class="fa-solid fa-wrench"></i>
            <span class="logo-text">Garage ERP</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html" class="active"><i class="fa-solid fa-chart-line"></i> <span class="menu-text">Dashboard</span></a></li>
            <li><a href="customers.html"><i class="fa-solid fa-users"></i> <span class="menu-text">Customers</span></a></li>
            <li><a href="work-orders.html"><i class="fa-solid fa-clipboard-list"></i> <span class="menu-text">Work Orders</span></a></li>
            <li><a href="inventory.html"><i class="fa-solid fa-boxes-stacked"></i> <span class="menu-text">Inventory</span></a></li>
            <li><a href="billing.html"><i class="fa-solid fa-file-invoice-dollar"></i> <span class="menu-text">Billing</span></a></li>
            <li><a href="reports.html"><i class="fa-solid fa-chart-pie"></i> <span class="menu-text">Reports</span></a></li>
            <li><a href="settings.html"><i class="fa-solid fa-gear"></i> <span class="menu-text">Settings</span></a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-wrapper" id="main-wrapper">
        <header class="top-nav">
            <div class="nav-left">
                <button id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
            </div>
            <div class="nav-right">
                <span>Admin User</span>
                <i class="fa-solid fa-circle-user fa-xl" style="color:var(--primary-color);"></i>
            </div>
        </header>

        <div class="content-area">
            <div class="page-header">
                <h2>Dashboard Overview</h2>
                <button class="btn-primary" onclick="showAddModal('New Work Order', 'Create a new work order from here.')"><i class="fa-solid fa-plus"></i> Quick Work Order</button>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-car"></i></div>
                    <div class="stat-details">
                        <h3>Today's Services</h3>
                        <p>12</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
                    <div class="stat-details">
                        <h3>Pending Work Orders</h3>
                        <p>8</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#FEE2E2; color:#EF4444;"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div class="stat-details">
                        <h3>Low Inventory Items</h3>
                        <p>5</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#D1FAE5; color:#10B981;"><i class="fa-solid fa-dollar-sign"></i></div>
                    <div class="stat-details">
                        <h3>Today's Revenue</h3>
                        <p>$1,240</p>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Monthly Revenue</h3>
                    <canvas id="revenueChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Service Distribution</h3>
                    <canvas id="serviceChart"></canvas>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- JS -->
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
